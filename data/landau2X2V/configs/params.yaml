# Small/fast GYSELA Landau 2D2V config for the benchmark (16x16x17x17).
# Algorithm.nbiter and Input.* are overwritten per run by the dataset; the rest
# (mesh, species, time step, diagnostic cadence) defines the physics case.
Input:
  fdistribu_filename: "none"
  nb_restart: 0
  iter_offset: 0

SplineMesh:
  x_min: 0.0
  x_max: 12.56637061435917
  x_ncells: 16
  y_min: 0.0
  y_max: 12.56637061435917
  y_ncells: 16
  vx_min: -6.0
  vx_max: +6.0
  vx_ncells: 17
  vy_min: -6.0
  vy_max: +6.0
  vy_ncells: 17

SpeciesInfo:
- charge: -1.
  mass: 0.0005
  density_eq: 1.
  temperature_eq: 1.
  mean_velocity_eq: 0.
  perturb_amplitude: 0.05
  perturb_mode: 1

Algorithm:
  deltat: 0.25
  nbiter: 10

# A diagnostic is saved every Output.time_diag (= deltat here, i.e. every
# iteration), so each step yields a trajectory point regardless of nbiter.
Output:
  time_diag: 0.25
